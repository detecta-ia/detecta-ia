<div class="carrinho-container">
  <!-- Cabeçalho do Carrinho -->
  <div class="carrinho-cabecalho">
    <h2 class="titulo-secao">Carrinho Atual</h2>
    <span class="emblema-contagem">
      {{ quantidadeItens }} {{ quantidadeItens === 1 ? 'ITEM' : 'ITENS' }}
    </span>
  </div>

  <!-- Lista de Itens com Scroll -->
  <div class="carrinho-itens-lista">
    @for (item of itens; track item.id + '_' + $index) {
      <item-carrinho [item]="item" class="item-lista"></item-carrinho>
    } @empty {
      <div class="estado-vazio">
        <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="var(--text-secondary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="icone-vazio">
          <circle cx="9" cy="21" r="1"></circle>
          <circle cx="20" cy="21" r="1"></circle>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>
        <span class="mensagem-vazia">Aguardando escaneamento...</span>
        <span class="submensagem-vazia">Passe um produto sob o visor da câmera</span>
      </div>
    }
  </div>

  <!-- Bloco do Total a Pagar -->
  <div class="bloco-total">
    <div class="total-rotulo">TOTAL A PAGAR</div>
    <div class="total-valor">
      R$ {{ totalAPagar.toFixed(2).replace('.', ',') }}
    </div>
  </div>

  <!-- Rodapé com Ações -->
  <div class="carrinho-acoes">
    <button 
      class="botao-limpar" 
      (click)="limpar()" 
      [disabled]="quantidadeItens === 0"
    >
      Limpar Carrinho
    </button>
    <button 
      class="botao-finalizar" 
      (click)="finalizar()" 
      [disabled]="quantidadeItens === 0"
    >
      Finalizar Compra
    </button>
  </div>
</div>
